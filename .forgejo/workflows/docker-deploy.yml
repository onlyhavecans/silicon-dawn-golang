---
name: docker-deploy

on:
  push:
    branches:
      - main

env:
  CACHE_KEY: 2024-03-06

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        id: cache
        with:
          path: ./data
          key: cards-${{ env.CACHE_KEY }}
          restore-keys: |
            cards-

      - name: Download cards
        if: steps.cache.outputs.cache-hit == false
        run: |
          curl -OL "http://egypt.urnash.com/media/blogs.dir/1/files/2018/01/The-Tarot-of-the-Silicon-Dawn.zip"
          mkdir -p ./data
          unzip -oj The-Tarot-of-the-Silicon-Dawn.zip -x "__MACOSX/*" "*/sand-home*" -d ./data

      - name: Set up Docker Buildx
        uses: actions/setup-buildx@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: |
            network=host

      - name: Login to Docker Hub
        uses: actions/login-docker@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: actions/build-push-docker@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: true
          tags: skwrl/silicon-dawn:latest
